          <h1 id="WPF-MVVM框架——-Prism中配置NLog-just–like-博客园"><a href="#WPF-MVVM框架——-Prism中配置NLog-just–like-博客园" class="headerlink" title="WPF MVVM框架—— Prism中配置NLog - just–like - 博客园"></a>WPF MVVM框架—— Prism中配置NLog - just–like - 博客园</h1><blockquote>
<h2 id="Excerpt"><a href="#Excerpt" class="headerlink" title="Excerpt"></a>Excerpt</h2><p>日志在生成环境中是必不可少的调试记录工具，在这里简单记录一下NLog在wpf中如何配置并如何注册到Prism的容器中 准备工作 需要安装三个NuGet程序包 Microsoft.Extensions.Logging.Abstraction NLog.Config NLog.Extensions.Lo</p>
</blockquote>
<hr>
<p>日志在生成环境中是必不可少的调试记录工具，在这里简单记录一下NLog在wpf中如何配置并如何注册到Prism的容器中</p>
<h2 id="准备工作"><a href="#准备工作" class="headerlink" title="准备工作"></a>准备工作</h2><p>需要安装三个NuGet程序包</p>
<p>Microsoft.Extensions.Logging.Abstraction</p>
<p>NLog.Config</p>
<p>NLog.Extensions.Logging</p>
<p><img src="/WPF%20MVVM%E6%A1%86%E6%9E%B6------%20Prism%E4%B8%AD%E9%85%8D%E7%BD%AENLog/IMG-20250804104606941.png"></p>
<h2 id="配置NLog"><a href="#配置NLog" class="headerlink" title="配置NLog"></a>配置NLog</h2><p>安装好之后在解决方案中会出现一个NLog.config，日志输出的路径，内容、规则等都在这个文件中进行配置，右击属性，将修改为始终复制。</p>
<p>若解决方案中没有出现NLog.config这个文件，则需要自己手动创建一个</p>
<p>关于配置，可以看NLog  github上的介绍  github: <a target="_blank" rel="noopener" href="https://github.com/NLog/NLog/wiki/Configuration-file">配置文件 ·NLog&#x2F;NLog Wiki ·GitHub</a></p>

lt;span&gt;=&quot;true&quot;&lt;/span&gt;&lt;span&gt;</span><br><span class="line">      internalLogLevel&lt;/span&gt;&lt;span&gt;=&quot;Info&quot;&lt;/span&gt;&lt;span&gt;</span><br><span class="line">      internalLogFile&lt;/span&gt;&lt;span&gt;=&quot;c:\temp\internal-nlog-AspNetCore.txt&quot;&lt;/span&gt;&lt;span&gt;&amp;gt;&lt;/span&gt;</span><br><span class="line"></span><br><span class="line">  &lt;span&gt;&amp;lt;!--&lt;/span&gt;&lt;span&gt; enable asp.net core layout renderers &lt;/span&gt;&lt;span&gt;--&amp;gt;&lt;/span&gt;</span><br><span class="line">  &lt;span&gt;&amp;lt;&lt;/span&gt;&lt;span&gt;extensions&lt;/span&gt;&lt;span&gt;&amp;gt;&lt;/span&gt;</span><br><span class="line">    &lt;span&gt;&amp;lt;&lt;/span&gt;&lt;span&gt;add &lt;/span&gt;&lt;span&gt;assembly&lt;/span&gt;&lt;span&gt;=&quot;NLog.Web.AspNetCore&quot;&lt;/span&gt; &lt;span&gt;/&amp;gt;&lt;/span&gt;</span><br><span class="line">  &lt;span&gt;&amp;lt;/&lt;/span&gt;&lt;span&gt;extensions&lt;/span&gt;&lt;span&gt;&amp;gt;&lt;/span&gt;</span><br><span class="line"></span><br><span class="line">  &lt;span&gt;&amp;lt;!--&lt;/span&gt;&lt;span&gt; the targets to write to &lt;/span&gt;&lt;span&gt;--&amp;gt;&lt;/span&gt;</span><br><span class="line">  &lt;span&gt;&amp;lt;&lt;/span&gt;&lt;span&gt;targets&lt;/span&gt;&lt;span&gt;&amp;gt;&lt;/span&gt;</span><br><span class="line">    &lt;span&gt;&amp;lt;!--&lt;/span&gt;&lt;span&gt; File Target for all log messages with basic details &lt;/span&gt;&lt;span&gt;--&amp;gt;&lt;/span&gt;</span><br><span class="line">    &lt;span&gt;&amp;lt;&lt;/span&gt;&lt;span&gt;target &lt;/span&gt;&lt;span&gt;xsi:type&lt;/span&gt;&lt;span&gt;=&quot;File&quot;&lt;/span&gt;&lt;span&gt; name&lt;/span&gt;&lt;span&gt;=&quot;allfile&quot;&lt;/span&gt;&lt;span&gt; fileName&lt;/span&gt;&lt;span&gt;=&quot;$&#123;basedir&#125;/Logs/allfile/wpf-all-$&#123;shortdate&#125;.log&quot;&lt;/span&gt;&lt;span&gt;</span><br><span class="line">            layout&lt;/span&gt;&lt;span&gt;=&quot;$&#123;longdate&#125;|$&#123;event-properties:item=EventId:whenEmpty=0&#125;|$&#123;level:uppercase=true&#125;|$&#123;logger&#125;|$&#123;message&#125; $&#123;exception:format=tostring&#125;&quot;&lt;/span&gt; &lt;span&gt;/&amp;gt;&lt;/span&gt;</span><br><span class="line"></span><br><span class="line">    &lt;span&gt;&amp;lt;!--&lt;/span&gt;&lt;span&gt; File Target for own log messages with extra web details using some ASP.NET core renderers &lt;/span&gt;&lt;span&gt;--&amp;gt;&lt;/span&gt;</span><br><span class="line">    &lt;span&gt;&amp;lt;&lt;/span&gt;&lt;span&gt;target &lt;/span&gt;&lt;span&gt;xsi:type&lt;/span&gt;&lt;span&gt;=&quot;File&quot;&lt;/span&gt;&lt;span&gt; name&lt;/span&gt;&lt;span&gt;=&quot;ownFile-web&quot;&lt;/span&gt;&lt;span&gt; fileName&lt;/span&gt;&lt;span&gt;=&quot;$&#123;basedir&#125;/Logs/ownFile/wpf-own-$&#123;shortdate&#125;.log&quot;&lt;/span&gt;&lt;span&gt;</span><br><span class="line">            layout&lt;/span&gt;&lt;span&gt;=&quot;$&#123;longdate&#125;|$&#123;event-properties:item=EventId:whenEmpty=0&#125;|$&#123;level:uppercase=true&#125;|$&#123;logger&#125;|$&#123;message&#125; $&#123;exception:format=tostring&#125;|url: $&#123;aspnet-request-url&#125;|action: $&#123;aspnet-mvc-action&#125;|$&#123;callsite&#125;&quot;&lt;/span&gt; &lt;span&gt;/&amp;gt;&lt;/span&gt;</span><br><span class="line"></span><br><span class="line">    &lt;span&gt;&amp;lt;!--&lt;/span&gt;&lt;span&gt;Console Target for hosting lifetime messages to improve Docker / Visual Studio startup detection &lt;/span&gt;&lt;span&gt;--&amp;gt;&lt;/span&gt;</span><br><span class="line">    &lt;span&gt;&amp;lt;&lt;/span&gt;&lt;span&gt;target &lt;/span&gt;&lt;span&gt;xsi:type&lt;/span&gt;&lt;span&gt;=&quot;Console&quot;&lt;/span&gt;&lt;span&gt; name&lt;/span&gt;&lt;span&gt;=&quot;lifetimeConsole&quot;&lt;/span&gt;&lt;span&gt; layout&lt;/span&gt;&lt;span&gt;=&quot;$&#123;MicrosoftConsoleLayout&#125;&quot;&lt;/span&gt; &lt;span&gt;/&amp;gt;&lt;/span&gt;</span><br><span class="line">  &lt;span&gt;&amp;lt;/&lt;/span&gt;&lt;span&gt;targets&lt;/span&gt;&lt;span&gt;&amp;gt;&lt;/span&gt;</span><br><span class="line"></span><br><span class="line">  &lt;span&gt;&amp;lt;!--&lt;/span&gt;&lt;span&gt; rules to map from logger name to target &lt;/span&gt;&lt;span&gt;--&amp;gt;&lt;/span&gt;</span><br><span class="line">  &lt;span&gt;&amp;lt;&lt;/span&gt;&lt;span&gt;rules&lt;/span&gt;&lt;span&gt;&amp;gt;&lt;/span&gt;</span><br><span class="line">    &lt;span&gt;&amp;lt;!--&lt;/span&gt;&lt;span&gt;All logs, including from Microsoft&lt;/span&gt;&lt;span&gt;--&amp;gt;&lt;/span&gt;</span><br><span class="line">    &lt;span&gt;&amp;lt;&lt;/span&gt;&lt;span&gt;logger &lt;/span&gt;&lt;span&gt;name&lt;/span&gt;&lt;span&gt;=&quot;*&quot;&lt;/span&gt;&lt;span&gt; minlevel&lt;/span&gt;&lt;span&gt;=&quot;Trace&quot;&lt;/span&gt;&lt;span&gt; writeTo&lt;/span&gt;&lt;span&gt;=&quot;allfile&quot;&lt;/span&gt; &lt;span&gt;/&amp;gt;&lt;/span&gt;</span><br><span class="line"></span><br><span class="line">    &lt;span&gt;&amp;lt;!--&lt;/span&gt;&lt;span&gt;Output hosting lifetime messages to console target for faster startup detection &lt;/span&gt;&lt;span&gt;--&amp;gt;&lt;/span&gt;</span><br><span class="line">    &lt;span&gt;&amp;lt;&lt;/span&gt;&lt;span&gt;logger &lt;/span&gt;&lt;span&gt;name&lt;/span&gt;&lt;span&gt;=&quot;Microsoft.Hosting.Lifetime&quot;&lt;/span&gt;&lt;span&gt; minlevel&lt;/span&gt;&lt;span&gt;=&quot;Info&quot;&lt;/span&gt;&lt;span&gt; writeTo&lt;/span&gt;&lt;span&gt;=&quot;lifetimeConsole, ownFile-web&quot;&lt;/span&gt;&lt;span&gt; final&lt;/span&gt;&lt;span&gt;=&quot;true&quot;&lt;/span&gt; &lt;span&gt;/&amp;gt;&lt;/span&gt;</span><br><span class="line"></span><br><span class="line">    &lt;span&gt;&amp;lt;!--&lt;/span&gt;&lt;span&gt;Skip non-critical Microsoft logs and so log only own logs (BlackHole) &lt;/span&gt;&lt;span&gt;--&amp;gt;&lt;/span&gt;</span><br><span class="line">    &lt;span&gt;&amp;lt;&lt;/span&gt;&lt;span&gt;logger &lt;/span&gt;&lt;span&gt;name&lt;/span&gt;&lt;span&gt;=&quot;Microsoft.*&quot;&lt;/span&gt;&lt;span&gt; maxlevel&lt;/span&gt;&lt;span&gt;=&quot;Info&quot;&lt;/span&gt;&lt;span&gt; final&lt;/span&gt;&lt;span&gt;=&quot;true&quot;&lt;/span&gt; &lt;span&gt;/&amp;gt;&lt;/span&gt;</span><br><span class="line">    &lt;span&gt;&amp;lt;&lt;/span&gt;&lt;span&gt;logger &lt;/span&gt;&lt;span&gt;name&lt;/span&gt;&lt;span&gt;=&quot;System.Net.Http.*&quot;&lt;/span&gt;&lt;span&gt; maxlevel&lt;/span&gt;&lt;span&gt;=&quot;Info&quot;&lt;/span&gt;&lt;span&gt; final&lt;/span&gt;&lt;span&gt;=&quot;true&quot;&lt;/span&gt; &lt;span&gt;/&amp;gt;&lt;/span&gt;</span><br><span class="line"></span><br><span class="line">    &lt;span&gt;&amp;lt;&lt;/span&gt;&lt;span&gt;logger &lt;/span&gt;&lt;span&gt;name&lt;/span&gt;&lt;span&gt;=&quot;*&quot;&lt;/span&gt;&lt;span&gt; minlevel&lt;/span&gt;&lt;span&gt;=&quot;Trace&quot;&lt;/span&gt;&lt;span&gt; writeTo&lt;/span&gt;&lt;span&gt;=&quot;ownFile-web&quot;&lt;/span&gt; &lt;span&gt;/&amp;gt;&lt;/span&gt;</span><br><span class="line">  &lt;span&gt;&amp;lt;/&lt;/span&gt;&lt;span&gt;rules&lt;/span&gt;&lt;span&gt;&amp;gt;&lt;/span&gt;</span><br><span class="line">&lt;span&gt;&amp;lt;/&lt;/span&gt;&lt;span&gt;nlog&lt;/span&gt;&lt;span&gt;&amp;gt;&lt;/span&gt;</span><br></pre></td></tr></table></figure>

<p><img src="/WPF%20MVVM%E6%A1%86%E6%9E%B6------%20Prism%E4%B8%AD%E9%85%8D%E7%BD%AENLog/IMG-20250804104607041.gif" alt="复制代码"></p>
<h2 id="创建实例并注册到IOC容器中"><a href="#创建实例并注册到IOC容器中" class="headerlink" title="创建实例并注册到IOC容器中"></a>创建实例并注册到IOC容器中</h2><p>打开App.xaml.cs</p>
<p><img src="/WPF%20MVVM%E6%A1%86%E6%9E%B6------%20Prism%E4%B8%AD%E9%85%8D%E7%BD%AENLog/IMG-20250804104607041.gif" alt="复制代码"></p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">&lt;span&gt;private&lt;/span&gt;&lt;span&gt; ILogger _logger;</span><br><span class="line">&lt;/span&gt;&lt;span&gt;protected&lt;/span&gt; &lt;span&gt;override&lt;/span&gt; &lt;span&gt;void&lt;/span&gt;&lt;span&gt; RegisterTypes(IContainerRegistry containerRegistry)</span><br><span class="line">&#123;</span><br><span class="line">    &lt;/span&gt;&lt;span&gt;var&lt;/span&gt; factory = &lt;span&gt;new&lt;/span&gt;&lt;span&gt; NLogLoggerFactory();</span><br><span class="line">    _logger &lt;/span&gt;= factory.CreateLogger(&lt;span&gt;&quot;&lt;/span&gt;&lt;span&gt;NLog.config&lt;/span&gt;&lt;span&gt;&quot;&lt;/span&gt;&lt;span&gt;);</span><br><span class="line">    containerRegistry.RegisterInstance&lt;/span&gt;&amp;lt;ILogger&amp;gt;&lt;span&gt;(_logger);</span><br><span class="line">&#125;&lt;/span&gt;</span><br></pre></td></tr></table></figure>

<p><img src="/WPF%20MVVM%E6%A1%86%E6%9E%B6------%20Prism%E4%B8%AD%E9%85%8D%E7%BD%AENLog/IMG-20250804104607041.gif" alt="复制代码"></p>
<p>这里要注册为单例类型，整个App使用的是同一个实例</p>
<h2 id="获取及使用"><a href="#获取及使用" class="headerlink" title="获取及使用"></a>获取及使用</h2><p>日志实例通过构造函数注入获取，</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">&lt;span&gt;public&lt;/span&gt;&lt;span&gt; MainViewModel(ILogger logger)</span><br><span class="line">&#123;</span><br><span class="line">    &lt;/span&gt;&lt;span&gt;this&lt;/span&gt;._logger =&lt;span&gt; logger;</span><br><span class="line">&#125;&lt;/span&gt;</span><br></pre></td></tr></table></figure>

<p>使用</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">_logger.LogInformation($&lt;span&gt;&quot;&lt;/span&gt;&lt;span&gt;测试日志&lt;/span&gt;&lt;span&gt;&quot;&lt;/span&gt;);</span><br></pre></td></tr></table></figure>

<p>注意;</p>
<p>在编写程序的过程中，很难保证程序不会因为异常而退出，这时就需要将异常信息打印出来，方便查找问题的所在，所以需要在App.xaml.cs 中的CreateShell方法中订阅一些异常事件,并将这些异常信息打印到日志中</p>
<p><img src="/WPF%20MVVM%E6%A1%86%E6%9E%B6------%20Prism%E4%B8%AD%E9%85%8D%E7%BD%AENLog/IMG-20250804104607041.gif" alt="复制代码"></p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br></pre></td><td class="code"><pre><span class="line">&lt;span&gt;protected&lt;/span&gt; &lt;span&gt;override&lt;/span&gt;&lt;span&gt; Window CreateShell()</span><br><span class="line">&#123;</span><br><span class="line">    &lt;/span&gt;&lt;span&gt;//&lt;/span&gt;&lt;span&gt;ui线程未捕获的异常&lt;/span&gt;</span><br><span class="line">    DispatcherUnhandledException +=&lt;span&gt; OnDispatcherUnhandledException;</span><br><span class="line">    &lt;/span&gt;&lt;span&gt;//&lt;/span&gt;&lt;span&gt;Task线程未捕获的异常&lt;/span&gt;</span><br><span class="line">    TaskScheduler.UnobservedTaskException +=&lt;span&gt; OnUnobservedTaskException;</span><br><span class="line">    &lt;/span&gt;&lt;span&gt;//&lt;/span&gt;&lt;span&gt;多线程异常&lt;/span&gt;</span><br><span class="line">    AppDomain.CurrentDomain.UnhandledException +=&lt;span&gt; OnUnhandledException;</span><br><span class="line">    &lt;/span&gt;&lt;span&gt;return&lt;/span&gt; Container.Resolve&amp;lt;MainView&amp;gt;&lt;span&gt;();</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">&lt;/span&gt;&lt;span&gt;private&lt;/span&gt; &lt;span&gt;void&lt;/span&gt; OnDispatcherUnhandledException(&lt;span&gt;object&lt;/span&gt;&lt;span&gt; sender, DispatcherUnhandledExceptionEventArgs e)</span><br><span class="line">&#123;</span><br><span class="line">    _logger.LogCritical($&lt;/span&gt;&lt;span&gt;&quot;&lt;/span&gt;&lt;span&gt;&#123;e.Exception.StackTrace&#125;,&#123;e.Exception.Message&#125;&lt;/span&gt;&lt;span&gt;&quot;&lt;/span&gt;&lt;span&gt;);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">&lt;/span&gt;&lt;span&gt;private&lt;/span&gt; &lt;span&gt;void&lt;/span&gt; OnUnobservedTaskException(&lt;span&gt;object&lt;/span&gt;?&lt;span&gt; sender, UnobservedTaskExceptionEventArgs e)</span><br><span class="line">&#123;</span><br><span class="line">    _logger.LogCritical($&lt;/span&gt;&lt;span&gt;&quot;&lt;/span&gt;&lt;span&gt;&#123;e.Exception.StackTrace&#125;,&#123;e.Exception.Message&#125;&lt;/span&gt;&lt;span&gt;&quot;&lt;/span&gt;&lt;span&gt;);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">&lt;/span&gt;&lt;span&gt;private&lt;/span&gt; &lt;span&gt;void&lt;/span&gt; OnUnhandledException(&lt;span&gt;object&lt;/span&gt;&lt;span&gt; sender, UnhandledExceptionEventArgs e)</span><br><span class="line">&#123;</span><br><span class="line">    Exception ex &lt;/span&gt;= e.ExceptionObject &lt;span&gt;as&lt;/span&gt;&lt;span&gt; Exception;</span><br><span class="line">    _logger.LogCritical($&lt;/span&gt;&lt;span&gt;&quot;&lt;/span&gt;&lt;span&gt;&#123;ex.StackTrace&#125;,&#123;ex.Message&#125;&lt;/span&gt;&lt;span&gt;&quot;&lt;/span&gt;&lt;span&gt;);</span><br><span class="line">&#125;&lt;/span&gt;</span><br></pre></td></tr></table></figure>

<p><img src="/WPF%20MVVM%E6%A1%86%E6%9E%B6------%20Prism%E4%B8%AD%E9%85%8D%E7%BD%AENLog/IMG-20250804104607041.gif" alt="复制代码"></p>
<h2 id="总结："><a href="#总结：" class="headerlink" title="总结："></a>总结：</h2><ol>
<li>安装三个NuGet程序包</li>
<li>配置NLog.config</li>
<li>创建日志实例，并注册到IOC容器中</li>
<li>获取实例，打印日志</li>
</ol>

          <h1 id="WPF-MultiRangeSlider-简单实现-UncleNull-博客园"><a href="#WPF-MultiRangeSlider-简单实现-UncleNull-博客园" class="headerlink" title="WPF MultiRangeSlider 简单实现 - UncleNull - 博客园"></a>WPF MultiRangeSlider 简单实现 - UncleNull - 博客园</h1><blockquote>
<h2 id="Excerpt"><a href="#Excerpt" class="headerlink" title="Excerpt"></a>Excerpt</h2><p>WPF 多滑块Slider简单实现（MultiRangeSlider） WPF中的MultiRangeSlider，网上有商业的，有开源的，找了几个都不太理想,那就自己写 一个吧，给大家提供点思路。 WPF中的Slider，看他的模板那就很复杂，如果想弄一个可以自定义样式的MultiRangeSli</p>
</blockquote>
<hr>
<h2 id="WPF-多滑块Slider简单实现（MultiRangeSlider）"><a href="#WPF-多滑块Slider简单实现（MultiRangeSlider）" class="headerlink" title="WPF 多滑块Slider简单实现（MultiRangeSlider）"></a>WPF 多滑块Slider简单实现（MultiRangeSlider）</h2><p>WPF中的MultiRangeSlider，网上有商业的，有开源的，找了几个都不太理想,那就自己写<br>一个吧，给大家提供点思路。</p>
<p>WPF中的Slider，看他的模板那就很复杂，如果想弄一个可以自定义样式的MultiRangeSlider<br>那就得花大时间好好弄，粗略的想MultiRangeSlider不就是几个滑块(Thumb),加几个矩形么，<br>一个滑块对应两个矩形，滑块移动的时候，不就两边的矩形的宽度的变化么，矩形我们只想<br>关注宽度变化，不想再去调整他的其实位置，用什么容器来装矩形呢，StackPanel，里面的对象<br>总是首尾相连的嘛，可是要使Thumb能够水平移动，在StackPanel中显示不合适，那就放到Canvas<br>中，然后把这两个容器使用Grid叠在一起，Canvas在上，就是下面这个样子</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">Grid</span>&gt;</span> <span class="tag">&lt;<span class="name">StackPanel</span> <span class="attr">Margin</span>=<span class="string">&quot;15,0,15,0&quot;</span> <span class="attr">x:Name</span>=<span class="string">&quot;RangeContainer&quot;</span> <span class="attr">Orientation</span>=<span class="string">&quot;Horizontal&quot;</span>&gt;</span> <span class="tag">&lt;/<span class="name">StackPanel</span>&gt;</span> <span class="tag">&lt;<span class="name">Canvas</span> <span class="attr">x:Name</span>=<span class="string">&quot;ThumbContainer&quot;</span>&gt;</span> <span class="tag">&lt;/<span class="name">Canvas</span>&gt;</span> <span class="tag">&lt;/<span class="name">Grid</span>&gt;</span></span><br></pre></td></tr></table></figure>

<p>滑块为了好看，也做了样式修改</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">Style</span> <span class="attr">TargetType</span>=<span class="string">&quot;local:ThumbEx&quot;</span>&gt;</span><span class="language-xml"> <span class="tag">&lt;<span class="name">Setter</span> <span class="attr">Property</span>=<span class="string">&quot;Width&quot;</span> <span class="attr">Value</span>=<span class="string">&quot;30&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">Setter</span>&gt;</span> <span class="tag">&lt;<span class="name">Setter</span> <span class="attr">Property</span>=<span class="string">&quot;Height&quot;</span> <span class="attr">Value</span>=<span class="string">&quot;150&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">Setter</span>&gt;</span> <span class="tag">&lt;<span class="name">Setter</span> <span class="attr">Property</span>=<span class="string">&quot;Template&quot;</span>&gt;</span> <span class="tag">&lt;<span class="name">Setter.Value</span>&gt;</span> <span class="tag">&lt;<span class="name">ControlTemplate</span> <span class="attr">TargetType</span>=<span class="string">&quot;Thumb&quot;</span>&gt;</span> <span class="tag">&lt;<span class="name">Grid</span>&gt;</span> <span class="tag">&lt;<span class="name">Grid.RowDefinitions</span>&gt;</span> <span class="tag">&lt;<span class="name">RowDefinition</span> <span class="attr">Height</span>=<span class="string">&quot;40&quot;</span> /&gt;</span> <span class="tag">&lt;<span class="name">RowDefinition</span> /&gt;</span> <span class="tag">&lt;<span class="name">RowDefinition</span> <span class="attr">Height</span>=<span class="string">&quot;40&quot;</span> /&gt;</span> <span class="tag">&lt;/<span class="name">Grid.RowDefinitions</span>&gt;</span> <span class="tag">&lt;<span class="name">StackPanel</span>&gt;</span> <span class="tag">&lt;<span class="name">Rectangle</span> <span class="attr">SnapsToDevicePixels</span>=<span class="string">&quot;True&quot;</span> <span class="attr">Height</span>=<span class="string">&quot;30&quot;</span> <span class="attr">StrokeThickness</span>=<span class="string">&quot;0&quot;</span> <span class="attr">Stroke</span>=<span class="string">&quot;LightGray&quot;</span> <span class="attr">Fill</span>=<span class="string">&quot;LightGray&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">Rectangle</span>&gt;</span> <span class="tag">&lt;<span class="name">Path</span> <span class="attr">Fill</span>=<span class="string">&quot;LightGray&quot;</span> <span class="attr">Stroke</span>=<span class="string">&quot;LightGray&quot;</span> <span class="attr">StrokeThickness</span>=<span class="string">&quot;1&quot;</span> <span class="attr">Data</span>=<span class="string">&quot;M0,0 L30,0 L15,10z&quot;</span>&gt;</span> <span class="tag">&lt;/<span class="name">Path</span>&gt;</span> <span class="tag">&lt;/<span class="name">StackPanel</span>&gt;</span> <span class="tag">&lt;<span class="name">Path</span> <span class="attr">Grid.Row</span>=<span class="string">&quot;1&quot;</span> <span class="attr">Data</span>=<span class="string">&quot;M15,0 L15,110&quot;</span> <span class="attr">Fill</span>=<span class="string">&quot;Black&quot;</span> <span class="attr">Stroke</span>=<span class="string">&quot;Black&quot;</span> <span class="attr">StrokeThickness</span>=<span class="string">&quot;1&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">Path</span>&gt;</span> <span class="tag">&lt;<span class="name">StackPanel</span> <span class="attr">Grid.Row</span>=<span class="string">&quot;2&quot;</span>&gt;</span> <span class="tag">&lt;<span class="name">Path</span> <span class="attr">Fill</span>=<span class="string">&quot;LightGray&quot;</span> <span class="attr">StrokeThickness</span>=<span class="string">&quot;1&quot;</span> <span class="attr">Stroke</span>=<span class="string">&quot;LightGray&quot;</span> <span class="attr">Data</span>=<span class="string">&quot;M15,0 L0,10 L30,10z&quot;</span>&gt;</span> <span class="tag">&lt;/<span class="name">Path</span>&gt;</span> <span class="tag">&lt;<span class="name">Rectangle</span> <span class="attr">Height</span>=<span class="string">&quot;30&quot;</span> <span class="attr">StrokeThickness</span>=<span class="string">&quot;0&quot;</span> <span class="attr">Stroke</span>=<span class="string">&quot;LightGray&quot;</span> <span class="attr">Fill</span>=<span class="string">&quot;LightGray&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">Rectangle</span>&gt;</span> <span class="tag">&lt;/<span class="name">StackPanel</span>&gt;</span> <span class="tag">&lt;/<span class="name">Grid</span>&gt;</span> <span class="tag">&lt;/<span class="name">ControlTemplate</span>&gt;</span> <span class="tag">&lt;/<span class="name">Setter.Value</span>&gt;</span> <span class="tag">&lt;/<span class="name">Setter</span>&gt;</span> </span><span class="tag">&lt;/<span class="name">Style</span>&gt;</span></span><br></pre></td></tr></table></figure>

<p>为了简便，我用了UserControl来实现这个控件，当然得支持各种数据Binding啊，对于这个控件来说，<br>我不需要知道外面是什么样的数据结构，我只需要知道我要展现多滑块需要哪些数据就行，<br>所以得有一个描述Range的数据结构</p>
<figure class="highlight csharp"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title">RangeItem</span> &#123; <span class="meta">#<span class="keyword">region</span> 字段 private double _from; private double _to; private string _name; private double _maxDuration; private bool _isStatic; private double _duration; #<span class="keyword">endregion</span> #<span class="keyword">region</span> 属性 public double From &#123; get &#123; return _from; &#125; set &#123; _from = value; &#125; &#125; public double To &#123; get &#123; return _to; &#125; set &#123; _to = value; &#125; &#125; /// &lt;summary&gt; /// 是否静止 /// &lt;/summary&gt; public bool IsStatic &#123; get &#123; return _isStatic; &#125; set &#123; _isStatic = value; &#125; &#125; public double Duration &#123; get &#123; return _duration; &#125; set &#123; _duration = value; &#125; &#125; public double MaxDuration &#123; get &#123; return _maxDuration; &#125; set &#123; _maxDuration = value; &#125; &#125; #<span class="keyword">endregion</span> &#125; 重要的属性有From（起始值），To（结束值），MaxDuration（总长），</span></span><br></pre></td></tr></table></figure>

<p>根据这一个数据，我们就能生成一个矩形。整个Slider的宽度是固定的，所以就可以根据<br>(To-From)&#x2F;MaxDuration*Slider长度，就能计算出这个矩形的宽度，直接加入StackPanel就<br>行。<br>矩形加进去了，现在加滑块，因为滑块是在Canvas中的，所以他需要确切知道Canvas.Left附加<br>属性，这个Left不就左边矩形的宽度么。在把滑块和左右两边的矩形关联起来，因为矩形的拖动事件<br>需要实时去改变两边的矩形的宽度。<br>我还是直接上代码吧，讲这么多你们也不一定清楚，哎。</p>

<p>由于PasswordBox.Password属性非依赖属性，所以不能作为绑定的目标，以下是本人的MVVM实现方法。</p>
<p> <img src="https://images2015.cnblogs.com/blog/825058/201510/825058-20151022133850208-320047702.png"></p>
<p>PasswordBox.Password与TextBox.Text同步，TextBox只是为了演示，实际使用的是TextBox.Text绑定的Source。</p>
<p>通过Behavior添加PasswordChanged事件的事件处理器，以及自定义一个附加属性实现绑定，Behavior需要引用System.Windows.Interactivity.dll，代码如下：</p>
<p><img src="https://common.cnblogs.com/images/copycode.gif" alt="复制代码"></p>
<p>using System.Windows; using System.Windows.Controls; using System.Windows.Interactivity; namespace PasswordHelperTest<br>{ public static class PasswordBoxHelper<br>    { public static readonly DependencyProperty PasswordProperty &#x3D; DependencyProperty.RegisterAttached(“Password”, typeof(string), typeof(PasswordBoxHelper), new FrameworkPropertyMetadata(string.Empty, OnPasswordPropertyChanged)); private static void OnPasswordPropertyChanged(DependencyObject sender, DependencyPropertyChangedEventArgs e)<br>        {<br>            PasswordBox passwordBox = sender as PasswordBox; string password &#x3D; (string)e.NewValue; if (passwordBox !&#x3D; null &amp;&amp; passwordBox.Password !&#x3D; password)<br>            {<br>                passwordBox.Password = password;<br>            }<br>        } public static string GetPassword(DependencyObject dp)<br>        { return (string)dp.GetValue(PasswordProperty);<br>        } public static void SetPassword(DependencyObject dp, string value)<br>        {<br>            dp.SetValue(PasswordProperty, value);<br>        }<br>    } public class PasswordBoxBehavior : Behavior<PasswordBox> { protected override void OnAttached()<br>        { base.OnAttached();</p>
<pre><code>        AssociatedObject.PasswordChanged += OnPasswordChanged;
    &#125; private static void OnPasswordChanged(object sender, RoutedEventArgs e)
    &#123;
        PasswordBox passwordBox \= sender as PasswordBox; string password = PasswordBoxHelper.GetPassword(passwordBox); if (passwordBox != null &amp;&amp; passwordBox.Password != password)
        &#123;
            PasswordBoxHelper.SetPassword(passwordBox, passwordBox.Password);
        &#125;
    &#125; protected override void OnDetaching()
    &#123; base.OnDetaching();

        AssociatedObject.PasswordChanged \-= OnPasswordChanged;
    &#125;
&#125;
</code></pre>
<p>}</p>
<p><img src="https://common.cnblogs.com/images/copycode.gif" alt="复制代码"></p>
<p>View代码如下：</p>

<p>&lt;Window x:Class&#x3D;”PasswordHelperTest.MainWindow” xmlns=“<a target="_blank" rel="noopener" href="http://schemas.microsoft.com/winfx/2006/xaml/presentation">http://schemas.microsoft.com/winfx/2006/xaml/presentation</a>“ xmlns:x=“<a target="_blank" rel="noopener" href="http://schemas.microsoft.com/winfx/2006/xaml">http://schemas.microsoft.com/winfx/2006/xaml</a>“ xmlns:i=“<a target="_blank" rel="noopener" href="http://schemas.microsoft.com/expression/2010/interactivity">http://schemas.microsoft.com/expression/2010/interactivity</a>“ xmlns:local=“clr-namespace:PasswordHelperTest” Title=“MainWindow” Height&#x3D;”350” Width&#x3D;”525”&gt;<br>    <StackPanel><br>        &lt;PasswordBox Margin&#x3D;”3” local:PasswordBoxHelper.Password&#x3D;”{Binding Path&#x3D;Password,Mode&#x3D;TwoWay,UpdateSourceTrigger&#x3D;PropertyChanged}”&gt;<br>            &lt;i:Interaction.Behaviors&gt;<br>                &lt;local:PasswordBoxBehavior &#x2F;&gt;<br>            &lt;&#x2F;i:Interaction.Behaviors&gt;<br>        </PasswordBox><br>        &lt;TextBox Margin&#x3D;”3” Text&#x3D;”{Binding Path&#x3D;Password,Mode&#x3D;TwoWay,UpdateSourceTrigger&#x3D;PropertyChanged}”&gt;</TextBox><br>    </StackPanel><br></Window></p>

<h4 id="1、确定控件应该继承的基类"><a href="#1、确定控件应该继承的基类" class="headerlink" title="1、确定控件应该继承的基类"></a>1、确定控件应该继承的基类</h4><p>从表面上看，目前WPF自带常用控件中，没有一个是接近这个表盘控件的，但将该控件拆分就能够发现，该控件的每个子部分都是在WPF中存在的，因此我们需要将各个子控件组合才能形成这个表盘控件，因此我们直接定义一个Dashboard类，继承自Control类。</p>
<h4 id="2、设置Dashboard的样式"><a href="#2、设置Dashboard的样式" class="headerlink" title="2、设置Dashboard的样式"></a>2、设置Dashboard的样式</h4><p>1</p>

<p>11</p>

<p>14</p>

<p>17</p>

<p><code>&lt;``Style</code> <code>TargetType=&quot;&#123;x:Type local:Dashboard&#125;&quot;&gt;</code></p>
<p> <code>&lt;``Setter</code> <code>Property=&quot;BorderBrush&quot; Value=&quot;Black&quot; /&gt;</code></p>
<p> <code>&lt;``Setter</code> <code>Property=&quot;BorderThickness&quot; Value=&quot;1&quot; /&gt;</code></p>
<p> <code>&lt;``Setter</code> <code>Property=&quot;Background&quot; Value=&quot;Transparent&quot; /&gt;</code></p>

<p><code>&lt;/``Style``&gt;</code></p>
<p> 主要注意的是，因为我们还不知道Dashboard内部到底有哪些东西，因此这里先放置了一个Grid，后面所有的代码将在<Grid></Grid>中编写</p>
<h4 id="3、确定控件的内部基本构造"><a href="#3、确定控件的内部基本构造" class="headerlink" title="3、确定控件的内部基本构造"></a>3、确定控件的内部基本构造</h4><p>该表盘控件从表面上看去，共由三个部分组成</p>
<ul>
<li>有文字显示的刻度</li>
<li>有进度展示的圆弧（红色与灰色部分的圆弧）</li>
<li>中间偏下的内容展示区域</li>
</ul>
<p>确定内部的基本组成后，就会发现一个问题，WPF中貌似没有能显示文字的刻度这样的一个控件，也没有②中描述的这么一个控件。很明显①、②也是由各个子控件组合而成的。</p>
<p>虽然WPF中没有①中这样的控件，但我们知道有PathListBox与Arc这样的一个控件，Arc应该都知道，就是一段圆弧，但是PathListBox可能就有点陌生了，下面在正式讲解Dashboard控件前，有必要讲解一个PathListBox。</p>
<h4 id="3-1、PathListBox"><a href="#3-1、PathListBox" class="headerlink" title="3.1、PathListBox"></a>3.1、PathListBox</h4><p>从控件字面上描述来看Path指的是路径，ListBox指的是一个列表。那么PathListBox组合起来就是按照一定的路径，来显示列表中的各个Item，下面使用具体代码来认识一下这个控件</p>
<p>①、命名空间</p>
<p>在WPF默认的System.Windows.Controls下面是找不到PathListBox的，需引入Microsoft.Expression.Controls.dll，然后在xaml中定义命名空间的别名</p>
<p>1</p>
<p><code>xmlns:ec=&quot;http://schemas.microsoft.com/expression/2010/controls&quot;</code></p>
<p>②、具体用法</p>
<p>既然是按照一定路径排列各个Item，那肯定得先定义一个Path路径，这里先定义一个长500的直线Path</p>
<p>1</p>
<p><code>&lt;``Path</code> <code>x:Name=&quot;path&quot; Data=&quot;M0,0 500,0&quot; Stroke=&quot;Black&quot; StrokeThickness=&quot;1&quot; /&gt;</code></p>
<p>然后放置PathListBox，在PathListBox的LayoutPath中去设置PathListBox应该按照哪个路径去排列，在ItemsTemplate中设置每个Item子项应该呈现成什么效果，最后在后台设置PathListBox的ItemsSource，设置PathListBox一共有几个Item子项。完整代码如下：</p>

<p> <code>&lt;``ec:PathListBox</code> <code>x:Name=&quot;pathListBox&quot;&gt;</code></p>

<h4 id="3-2、Arc"><a href="#3-2、Arc" class="headerlink" title="3.2、Arc"></a>3.2、Arc</h4><p>Arc就是圆弧的意思，这个控件比较简单，直接贴出代码</p>

<p>学习了下PathListBox与Arc的用法后，下面正式讲解Dashboard是如何创建的。</p>
<h3 id="4、正式构建控件"><a href="#4、正式构建控件" class="headerlink" title="4、正式构建控件"></a><strong>4、正式构建控件</strong></h3><h4 id="4-1、刻度部分"><a href="#4-1、刻度部分" class="headerlink" title="4.1、刻度部分"></a>4.1、刻度部分</h4><p>Dashboard表盘控件共有2种刻度，一个是长一点的刻度，一个是短一点的刻度。如果我们只是用一个PathListBox是不能达到这种效果的，因此这里使用了2个PathListBox，一个PathListBox放置短一点的刻度，一个PathListBox放置长一点的刻度，将他们2个叠加放在一起，就能达到这种效果。</p>

<p><code>private</code> <code>static</code> <code>void</code> <code>OnValuePropertyChanged(DependencyObject d, DependencyPropertyChangedEventArgs e)</code></p>
<p><code>&#123;</code></p>
<p><code>&#125;</code></p>
<p><code>#endregion</code></p>
<p>之外为了设置圆弧的角度，还需要新增一个Angle依赖属性</p>
<p>1</p>
<p>2</p>
<p>3</p>
<p>4</p>
<p>5</p>
<p>6</p>
<p>7</p>
<p>8</p>
<p>9</p>
<p><code>#region Angle</code></p>
<p><code>public</code> <code>double</code> <code>Angle</code></p>
<p><code>&#123;</code></p>
<p> <code>get</code> <code>&#123;</code> <code>return</code> <code>(``double``)GetValue(AngleProperty); &#125;</code></p>
<p> <code>set</code> <code>&#123; SetValue(AngleProperty, value); &#125;</code></p>
<p><code>&#125;</code></p>
<p><code>public</code> <code>static</code> <code>readonly</code> <code>DependencyProperty AngleProperty =</code></p>
<p> <code>DependencyProperty.Register(``&quot;Angle&quot;``,</code> <code>typeof``(``double``),</code> <code>typeof``(Dashboard),</code> <code>new</code> <code>PropertyMetadata(0d));</code></p>
<p><code>#endregion</code></p>
<p>在代码中，根据Value的值，自动设置Angle</p>
<p>1</p>
<p>2</p>
<p>3</p>
<p>4</p>
<p>5</p>
<p>6</p>
<p><code>private</code> <code>void</code> <code>SetAngle()</code></p>
<p><code>&#123;</code></p>
<p> <code>var</code> <code>diff =</code> <code>this``.Maximum -</code> <code>this``.Minimum;</code></p>
<p> <code>var</code> <code>valueDiff =</code> <code>this``.Value -</code> <code>this``.Minimum;</code></p>
<p> <code>this``.Angle = -120 + (120 - (-120)) / diff * valueDiff;</code></p>
<p><code>&#125;</code></p>
<p>算法解析：结束角度-起始角度可以得出圆弧总共经过的角度值，除以最大值与最小值的差值，得到1°对应的数值，乘以当前值与最小值的差值就可以得到差值所对应的角度总和了。由于起始角度不固定，因此最终的角度值应该是：起始角度+差值角度和</p>
<p>最终，我们的效果实现了：</p>

<p>这里面有一个不足的地方就是起始角度和结束角度硬编码成-120和120了，为了灵活性，可以将其设置为2个依赖属性，这个就自己去弄吧，这里就不贴出代码了。</p>

          <h1 id="WPF-Image控件下对于Base64的转化显示-樱花落舞-博客园"><a href="#WPF-Image控件下对于Base64的转化显示-樱花落舞-博客园" class="headerlink" title="WPF Image控件下对于Base64的转化显示 - 樱花落舞 - 博客园"></a>WPF Image控件下对于Base64的转化显示 - 樱花落舞 - 博客园</h1><blockquote>
<h2 id="Excerpt"><a href="#Excerpt" class="headerlink" title="Excerpt"></a>Excerpt</h2><p>算作前言 本文对图片如何转化成base64不做描述，我们可以从很多途径了解到转化办法。却很少有博客提到怎么在WPF的Image控件中显示图片。 对于base64的合法性 随便拿一张图片转一下试一试： 额。好长….取前面一部分吧 data:image&#x2F;png;base64,iVBORw0KGgoA</p>
</blockquote>
<hr>
<h2 id="算作前言"><a href="#算作前言" class="headerlink" title="算作前言"></a>算作前言</h2><p>本文对图片如何转化成base64不做描述，我们可以从很多途径了解到转化办法。却很少有博客提到怎么在WPF的Image控件中显示图片。</p>
<p>随便拿一张图片转一下试一试：</p>
<p><a target="_blank" rel="noopener" href="https://img2018.cnblogs.com/blog/843428/201903/843428-20190316235637089-2146067042.png"><img src="/WPF%20Image%E6%8E%A7%E4%BB%B6%E4%B8%8B%E5%AF%B9%E4%BA%8EBase64%E7%9A%84%E8%BD%AC%E5%8C%96%E6%98%BE%E7%A4%BA/IMG-20250804104606609.png"></a></p>
<p>额。好长….取前面一部分吧</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAC4AAAA9CAMAAADlJaswAAAAe1BMVE.....</span><br></pre></td></tr></table></figure>

<p>C#对于这段数据，通常的做法是：</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">&lt;span&gt;try&lt;/span&gt;&lt;span&gt;</span><br><span class="line">&#123;</span><br><span class="line">    &lt;/span&gt;&lt;span&gt;byte&lt;/span&gt;[] streamBase =&lt;span&gt; Convert.FromBase64String(base64);</span><br><span class="line">&#125;</span><br><span class="line">&lt;/span&gt;&lt;span&gt;catch&lt;/span&gt;&lt;span&gt;(Exception ex)</span><br><span class="line">&#123;</span><br><span class="line">    Console.WriteLine(ex.Message);</span><br><span class="line">&#125;&lt;/span&gt;</span><br></pre></td></tr></table></figure>

<p>抛出了异常：</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">输入的不是有效的 Base-&lt;span&gt;64&lt;/span&gt; 字符串，因为它包含非 Base-&lt;span&gt;64&lt;/span&gt; 字符、两个以上的填充字符，或者填充字符间包含非法字符。</span><br></pre></td></tr></table></figure>

<p>明明是正常转化得来的，为什么却是不合法的字符串？其实这里还需要一点处理，就算把头部信息去掉！</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">&lt;span&gt;//&lt;/span&gt;&lt;span&gt;base64 = base64.Replace(&quot;data:image/png;base64,&quot;, &quot;&quot;).Replace(&quot;data:image/jgp;base64,&quot;, &quot;&quot;).Replace(&quot;data:image/jpg;base64,&quot;, &quot;&quot;).Replace(&quot;data:image/jpeg;base64,&quot;, &quot;&quot;);&lt;/span&gt;&lt;span&gt;//&lt;/span&gt;&lt;span&gt;将base64头部信息替换&lt;/span&gt;</span><br><span class="line">&lt;span&gt;string&lt;/span&gt; imagebase64 = base64.Substring(base64.IndexOf(&lt;span&gt;&quot;&lt;/span&gt;&lt;span&gt;,&lt;/span&gt;&lt;span&gt;&quot;&lt;/span&gt;) + &lt;span&gt;1&lt;/span&gt;);</span><br></pre></td></tr></table></figure>

<p>这样就可以成功转化了。现在来看怎么显示在Image里面。</p>
<h2 id="WPF中Image显示"><a href="#WPF中Image显示" class="headerlink" title="WPF中Image显示"></a>WPF中Image显示</h2><p> 答案：<a target="_blank" rel="noopener" href="https://stackoverflow.com/questions/593388/how-do-i-read-a-base64-image-in-wpf">https://stackoverflow.com/questions/593388/how-do-i-read-a-base64-image-in-wpf</a></p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">&lt;span&gt;string&lt;/span&gt; imagebase64 = base64.Substring(base64.IndexOf(&lt;span&gt;&quot;&lt;/span&gt;&lt;span&gt;,&lt;/span&gt;&lt;span&gt;&quot;&lt;/span&gt;) + &lt;span&gt;1&lt;/span&gt;&lt;span&gt;);</span><br><span class="line">&lt;/span&gt;&lt;span&gt;byte&lt;/span&gt;[] streamBase =&lt;span&gt; Convert.FromBase64String(imagebase64);</span><br><span class="line">BitmapImage bi &lt;/span&gt;= &lt;span&gt;new&lt;/span&gt;&lt;span&gt; BitmapImage();</span><br><span class="line">bi.BeginInit();</span><br><span class="line">bi.StreamSource &lt;/span&gt;= &lt;span&gt;new&lt;/span&gt;&lt;span&gt; MemoryStream(streamBase);</span><br><span class="line">bi.EndInit();</span><br><span class="line">Image.Source &lt;/span&gt;= bi;</span><br></pre></td></tr></table></figure>

<p>没啥太花里胡哨的东西。</p>

<p>收起</p>
<p><strong>一、引言</strong>  </p>
<p>   今天我们要讲【结构型】设计模式的第七个模式，也是“结构型”设计模式中的最后一个模式，该模式是【代理模式】，英文名称是：Proxy Pattern。还是老套路，先从名字上来看看。“代理”可以理解为“代替”，代替“主人”做一些事情，为什么需要“代理”，是因为某些原因（比如：安全方面的原因），不想让“主人”直接面对这些繁琐、复杂的问题，但是这些事情是经“主人”同意或者授意的，如同“主人”亲自完成的一样。这个模式很简单，生活中的例子也很多。举例说明，歌星、影星的经纪人就是现实生活中一个代理模式的很好例子，还有操作系统中的防火墙，也是代理的例子，要访问系统，先过防火墙这关，否则免谈。还有很多了，就不一一列举了，大家在生活中慢慢的体会吧。  </p>
<p><strong>二、代理模式的详细介绍</strong>  </p>
<p><strong>2.1、动机（Motivate）</strong>  </p>
<p>   在面向对象系统中，有些对象由于某种原因（比如对象创建的开销很大，或者某些操作需要安全控制，或者需要进程外的访问等），直接访问会给使用者、或者系统结构带来很多麻烦。如何在不失去透明操作对象的同时来管理&#x2F;控制这些对象特有的复杂性？增加一层间接层是软件开发中常见的解决方式。  </p>
<p><strong>2.2、意图（Intent）</strong>  </p>
<p>   为其他对象提供一种代理以控制对这个对象的访问。　　　　　　                                ——《设计模式》GoF  </p>
<p><strong>2.3、</strong>结构图（Structure）****  </p>
<p>      <img src="http://images2017.cnblogs.com/blog/1048776/201711/1048776-20171110123310075-309958657.png">  </p>
<p><strong>2.4、模式的组成</strong><br>    <br>    代理模式所涉及的角色有三个：  </p>
<p>    <strong>（1）、抽象主题角色（Subject）</strong>：声明了真实主题和代理主题的公共接口，这样一来在使用真实主题的任何地方都可以使用代理主题。  </p>
<p>    <strong>（2）、代理主题角色（Proxy）</strong>：代理主题角色内部含有对真实主题的引用，从而可以操作真实主题对象；代理主题角色负责在需要的时候创建真实主题对象；代理角色通常在将客户端调用传递到真实主题之前或之后，都要执行一些其他的操作，而不是单纯地将调用传递给真实主题对象。  </p>
<p>    <strong>（3）、真实主题角色（RealSubject）</strong>：定义了代理角色所代表的真实对象。  </p>
<p>    附：在WCF或者WebService的开发过程中，我们在客户端添加服务引用的时候，在客户程序中会添加一些额外的类，在客户端生成的类扮演着代理主题角色，我们客户端也是直接调用这些代理角色来访问远程服务提供的操作。这个是远程代理的一个典型例子。  </p>
<p><strong>2.5、代理模式的分类：</strong>  </p>
<p>    代理模式按照使用目的可以分为以下几种：  </p>
<p>    （1）、远程（Remote）代理：为一个位于不同的地址空间的对象提供一个局域代表对象。这个不同的地址空间可以是本电脑中，也可以在另一台电脑中。最典型的例子就是——客户端调用Web服务或WCF服务。  </p>
<p>    （2）、虚拟（Virtual）代理：根据需要创建一个资源消耗较大的对象，使得对象只在需要时才会被真正创建。  </p>
<p>    （3）、Copy-on-Write代理：虚拟代理的一种，把复制（或者叫克隆）拖延到只有在客户端需要时，才真正采取行动。  </p>
<p>    （4）、保护（Protect or Access）代理：控制一个对象的访问，可以给不同的用户提供不同级别的使用权限。  </p>
<p>    （5）、防火墙（Firewall）代理：保护目标不让恶意用户接近。  </p>
<p>    （6）、智能引用（Smart Reference）代理：当一个对象被引用时，提供一些额外的操作，比如将对此对象调用的次数记录下来等。  </p>
<p>    （7）、Cache代理：为某一个目标操作的结果提供临时的存储空间，以便多个客户端可以这些结果。  </p>
<p>   在上面所有种类的代理模式中，虚拟代理、远程代理、智能引用代理和保护代理较为常见的代理模式。  </p>
<p><strong>2.6、代理模式的具体实现</strong>  </p>
<p>    说起“代理模式”，其实很容易，现实生活中的例子也很多。明星的经纪人，国家的发言人都是代理的好例子。我们就用明星经纪人这个事情来介绍“代理模式”的实现吧。</p>
<p><a href="javascript:void(0);" title="复制代码"><img src="//assets.cnblogs.com/images/copycode.gif" alt="复制代码"></a></p>
<p> 1 namespace 代理模式的实现 2 {<br> 3     &#x2F;&#x2F;&#x2F; <summary><br> 4     &#x2F;&#x2F;&#x2F; 大明星都有钱，有钱了，就可以请自己的经纪人了，有了经纪人，很多事情就不用自己亲力亲为。弄点绯闻，炒作一下子通过经纪人就可以名正言顺的的操作了，万一搞不好，自己也可以否认。 5     &#x2F;&#x2F;&#x2F; </summary><br> 6     class Client 7     {<br> 8         static void Main(string[] args)<br> 9 {<br>10             &#x2F;&#x2F;近期，Fan姓明星关注度有点下降，来点炒作<br>11             AgentAbstract fan &#x3D; new AgentPerson();<br>12             fan.Speculation(“偶尔出来现现身，为炒作造势”);<br>13<br>14 Console.WriteLine();<br>15<br>16             &#x2F;&#x2F;过了段时间，又不行了，再炒作一次<br>17             fan.Speculation(“这段时间不火了，开始离婚炒作”);<br>18<br>19<br>20 Console.Read();<br>21 }<br>22 }<br>23<br>24<br>25     &#x2F;&#x2F;该类型就是抽象Subject角色，定义代理角色和真实主体角色共有的接口方法<br>26     public abstract class AgentAbstract<br>27 {<br>28<br>29         &#x2F;&#x2F;该方法执行具体的炒作—该方法相当于抽象Subject的Request方法<br>30         public virtual void Speculation(string thing)<br>31 {<br>32 Console.WriteLine(thing);<br>33 }<br>34 }<br>35<br>36     &#x2F;&#x2F;该类型是Fan姓明星，有钱有势，想炒什么炒什么—相当于具体的RealSubject角色<br>37     public sealed class FanStar : AgentAbstract<br>38 {<br>39         &#x2F;&#x2F;有钱有势，有背景啊<br>40         public FanStar() { }<br>41<br>42         &#x2F;&#x2F;要有名气，定期要炒作—就是RealSubject类型的Request方法<br>43         public override void Speculation(string thing)<br>44 {<br>45 Console.WriteLine(thing);<br>46 }<br>47 }<br>48<br>49     &#x2F;&#x2F;该类型是代理类型—-相当于具体的Proxy角色<br>50     public sealed class AgentPerson : AgentAbstract<br>51 {<br>52         &#x2F;&#x2F;这是背后的老板，<br>53         private FanStar boss;<br>54<br>55         &#x2F;&#x2F;老板在后面发号施令<br>56         public AgentPerson()<br>57 {<br>58             boss &#x3D; new FanStar();<br>59 }<br>60<br>61         &#x2F;&#x2F;炒作的方法，执行具体的炒作—就是Proxy类型的Request方法<br>62         public override void Speculation(string thing)<br>63 {<br>64             Console.WriteLine(“前期弄点绯闻，拍点野照”);<br>65             base.Speculation(thing);<br>66             Console.WriteLine(“然后开发布会，伤心哭泣，继续捞钱”);<br>67 }<br>68 }<br>69 }</p>
<p><a href="javascript:void(0);" title="复制代码"><img src="//assets.cnblogs.com/images/copycode.gif" alt="复制代码"></a></p>
<p>   这个模式很简单，就话不多说了。  </p>
<p><strong>三、代理模式的实现要点：</strong><br>    <br>    “增加一层间接层”是软件系统中对许多复杂问题的一种常见解决方法。在面向对象系统中，直接使用某些对象会来带很多问题，作为间接层的Proxy对象便是解决这一问题的常用手段。具体Proxy设计模式的实现方法、实现粒度都相差很大，有些可能对单个对象做细粒度的控制，如copy-on-write技术，有些可能对组件模块提供抽象代理层，在架构层次对对象做Proxy。  </p>
<p>　　Proxy并不一定要求保持接口的一致性，只要能够实现间接控制，有时候损及一些透明性是可以接受的。  </p>
<p>    <strong>3.1】、代理模式的优点：</strong>  </p>
<p>          （1）、代理模式能够将调用用于真正被调用的对象隔离，在一定程度上降低了系统的耦合度；  </p>
<p>          （2）、代理对象在客户端和目标对象之间起到一个中介的作用，这样可以起到对目标对象的保护。代理对象可以在对目标对象发出请求之前进行一个额外的操作，例如权限检查等。  </p>
<p>           <strong>不同类型的代理模式也具有独特的优点，例如：</strong>  </p>
<p>         （1）、<strong>远程代理</strong>为位于两个不同地址空间对象的访问提供了一种实现机制，可以将一些消耗资源较多的对象和操作移至性能更好的计算机上，提高系统的整体运行效率。  </p>
<p>         （2）、<strong>虚拟代理</strong>通过一个消耗资源较少的对象来代表一个消耗资源较多的对象，可以在一定程度上节省系统的运行开销。  </p>
<p>         （3）、<strong>缓冲代理</strong>为某一个操作的结果提供临时的缓存存储空间，以便在后续使用中能够共享这些结果，优化系统性能，缩短执行时间。  </p>
<p>         （4）、<strong>保护代理</strong>可以控制对一个对象的访问权限，为不同用户提供不同级别的使用权限。  </p>
<p>    <strong>3.2】、代理模式的缺点：</strong>  </p>
<p>          （1）、由于在客户端和真实主题之间增加了一个代理对象，所以会造成请求的处理速度变慢  </p>
<p>          （2）、实现代理类也需要额外的工作，从而增加了系统的实现复杂度。  </p>
<p>    <strong>3.3】、代理模式的使用场景：</strong>  </p>
<p>           代理模式的类型较多，不同类型的代理模式有不同的优缺点，它们应用于不同的场合：  </p>
<p>            （1）、 当客户端对象需要访问远程主机中的对象时可以使用<strong>远程代理</strong>。  </p>
<p>            （2）、当需要用一个消耗资源较少的对象来代表一个消耗资源较多的对象，从而降低系统开销、缩短运行时间时可以使用<strong>虚拟代理</strong>，例如一个对象需要很长时间才能完成加载时。  </p>
<p>            （3）、当需要为某一个被频繁访问的操作结果提供一个临时存储空间，以供多个客户端共享访问这些结果时可以使用<strong>缓冲代理</strong>。通过使用缓冲代理，系统无须在客户端每一次访问时都重新执行操作，只需直接从临时缓冲区获取操作结果即可。  </p>
<p>            （4）、 当需要控制对一个对象的访问，为不同用户提供不同级别的访问权限时可以使用<strong>保护代理</strong>。  </p>
<p>            （5）、当需要为一个对象的访问（引用）提供一些额外的操作时可以使用<strong>智能引用代理</strong>。  </p>
<p><strong>四、.NET 中代理模式的实现</strong>  </p>
<p>    代理模式在Net的FCL中的实现也不少，框架级别的有，类级别的也有。框架级别的有WCF,Remoting,他们都需要生成本地的代理，然后通过代理访问进程外或者机器外的对象。类级别的有StringBuilder类型，StringBuilder其实就是一种代理，我们本意是想访问字符串的，StringBuilder就是一种可变字符串的代理，而且StringBuilder也没有和String保持接口的一致性。  </p>
<p><strong>五、总结</strong>  </p>
<p>      到今天为止，我们设计模式的三个部分讲完两个部分了，第一个部分是“创建型”的设计模式，解决对象创建的问题，对对象创建的解耦。第二部分就是“结构型”的设计模式，所谓结构型设计模式模式，顾名思义讨论的是类和对象的结构 ，主要用来处理类或对象的组合。它包括两种类型，一是类结构型模式，指的是采用继承机制来组合接口或实现；二是对象结构型模式，指的是通过组合对象的方式来实现新的功能。它包括适配器模式、桥接模式、装饰者模式、组合模式、外观模式、享元模式和代理模式。设计模式到现在也说了不少了，但是看起来很多模式都很类似，之间好像很容转换，有时候条件不同了，的确模式也可以转换，但是不能肆意的转换。为了避免思想的混乱，我们把“结构型”这个几个设计模式，再总结一次，把握核心，理解使用场景。  </p>
<p>    适配器模式注重转换接口，将不吻合的接口适配对接  </p>
<p>    桥接模式注重分离接口与其实现，支持多维度变化  </p>
<p>    组合模式注重统一接口，将“一对多”的关系转化为“一对一”的关系  </p>
<p>    装饰者模式注重稳定接口，在此前提下为对象扩展功能  </p>
<p>    外观模式注重简化接口，简化组件系统与外部客户程序的依赖关系  </p>
<p>    享元模式注重保留接口，在内部使用共享技术对对象存储进行优化  </p>
<p>    代理模式注重假借接口，增加间接层来实现灵活控制  </p>
<p>  从下篇文章就开始写“行为型”设计模式，今天就到此结束了。</p>

<p>收起</p>
<p><strong>一、引言</strong>  </p>
<p>   今天我们开始讲“行为型”设计模式的第三个模式，该模式是【迭代器模式】，英文名称是：Iterator Pattern。还是老套路，先从名字上来看看。“迭代器模式”我第一次看到这个名称，我的理解是，迭代是遍历的意思，迭代器可以理解为是遍历某某的工具，遍历什么呢？在软件设计中，当然遍历的是集合对象，所以说迭代器模式是遍历集合的一种通用的算法。如果集合只有一种类型，那这个模式就没用了，就是因为集合对象包含数组、列表，字典和哈希表等各种对象，如果为每一种集合对象都实现一套遍历算法，也不太现实，因此为了解决遍历集合有一个统一的接口这个事情，所以就提出了“迭代器”这个模式。  </p>
<p><strong>二、迭代器模式的详细介绍</strong>  </p>
<p><strong>2.1、动机（Motivate）</strong>  </p>
<p>   在软件构建过程中，集合对象内部结构常常变化各异。但对于这些集合对象，我们希望在不暴露其内部结构的同时，可以让外部客户代码透明地访问其中包含的元素；同时这种“透明遍历”也为“同一种算法在多种集合对象上进行操作”提供了可能。  </p>
<p>　使用面向对象技术将这种遍历机制抽象为“迭代器对象”为“应对变化中的集合对象”提供了一种优雅的方式。  </p>
<p><strong>2.2、意图（Intent）</strong>  </p>
<p>   提供一种方法顺序访问一个聚合对象中的各个元素，而又不暴露该对象的内部表示。　　　　　　                                ——《设计模式》GoF  </p>
<p><strong>2.3、结构图</strong>  </p>
<p>       <img src="https://images2018.cnblogs.com/blog/1048776/201711/1048776-20171127130208487-1323685783.png">  </p>
<p><strong>2.4、模式的组成</strong><br>    <br>    从迭代器模式的结构图可以看出，它涉及到四个角色，它们分别是：  </p>
<p>    **（1）、抽象迭代器(Iterator)**：抽象迭代器定义了访问和遍历元素的接口，一般声明如下方法：用于获取第一个元素的first()，用于访问下一个元素的next()，用于判断是否还有下一个元素的hasNext()，用于获取当前元素的currentItem()，在其子类中将实现这些方法。  </p>
<p>    **（2）、具体迭代器(ConcreteIterator)**：具体迭代器实现了抽象迭代器接口，完成对集合对象的遍历，同时在对聚合进行遍历时跟踪其当前位置。  </p>
<p>    **（3）、抽象聚合类(Aggregate)**：抽象聚合类用于存储对象，并定义创建相应迭代器对象的接口，声明一个createIterator()方法用于创建一个迭代器对象。  </p>
<p>    **（4）、具体聚合类(ConcreteAggregate)**：具体聚合类实现了创建相应迭代器的接口，实现了在抽象聚合类中声明的createIterator()方法，并返回一个与该具体聚合相对应的具体迭代器ConcreteIterator实例。  </p>
<p><strong>2.5、迭代器模式的代码实现</strong>  </p>
<p>    迭代器模式在现实生活中也有类似的例子，比如：在部队中，我们可以让某一队伍当中的某人出列，或者让队列里面的每个人依次报名，其实这个过程就是一个遍历的过程。没什么可说的，具体实现代码如下：  </p>

<p>  <br><strong>三、迭代器模式的实现要点：</strong><br>    <br>     1、迭代抽象：访问一个聚合对象的内容而无需暴露它的内部表示。  </p>
<p>     2、迭代多态：为遍历不同的集合结构提供一个统一的接口，从而支持同样的算法在不同的集合结构上进行操作。  </p>
<p>     3、迭代器的健壮性考虑：遍历的同时更改迭代器所在的集合结构，会导致问题。<br>    <br>     <strong>3.1】、迭代器模式的优点：</strong>  </p>
<p>          （1）、迭代器模式使得访问一个聚合对象的内容而无需暴露它的内部表示，即迭代抽象。  </p>
<p>          （2）、迭代器模式为遍历不同的集合结构提供了一个统一的接口，从而支持同样的算法在不同的集合结构上进行操作  </p>
<p>    <strong>3.2】、迭代器模式的缺点：</strong>  </p>
<p>          （1）、迭代器模式在遍历的同时更改迭代器所在的集合结构会导致出现异常。所以使用foreach语句只能在对集合进行遍历，不能在遍历的同时更改集合中的元素。  </p>
<p>     <strong>3.3】、迭代器模式的使用场景：</strong>  </p>
<p>       （1）、访问一个聚合对象的内容而无需暴露它的内部表示。  </p>
<p>       （2）、支持对聚合对象的多种遍历。  </p>
<p>       （3）、为遍历不同的聚合结构提供一个统一的接口(即, 支持多态迭代)。  </p>
<p><strong>四、.NET 中迭代器模式的实现</strong>  </p>
<p>     在mscorlib程序集里有这样一个命名空间，该命名空间就是：System.Collections，在该命名空间里面早已有了迭代器模式的实现。对于聚集接口和迭代器接口已经存在了，<strong>其中IEnumerator扮演的就是迭代器的角色</strong>，它的实现如下：</p>
<p><a href="javascript:void(0);" title="复制代码"><img src="//assets.cnblogs.com/images/copycode.gif" alt="复制代码"></a></p>
<p>public interface IEnumerator<br> {<br>      object Current<br>      {<br>           get;<br>      }</p>
<pre><code> bool MoveNext();

 void Reset();
</code></pre>
<p> }</p>
<p><a href="javascript:void(0);" title="复制代码"><img src="//assets.cnblogs.com/images/copycode.gif" alt="复制代码"></a></p>
<p>     属性Current返回当前集合中的元素，Reset()方法恢复初始化指向的位置，MoveNext()方法返回值true表示迭代器成功前进到集合中的下一个元素，返回值false表示已经位于集合的末尾。能够提供元素遍历的集合对象，在.Net中都实现了IEnumerator接口。  </p>
<p>     <strong>IEnumerable则扮演的就是抽象聚集的角色</strong>，只有一个GetEnumerator()方法，如果集合对象需要具备跌代遍历的功能，就必须实现该接口。</p>
<p>public interface IEnumerable<br>{<br>    IEumerator GetEnumerator();<br>}</p>

<p>19.C#设计模式之十八状态模式（State Pattern）【行为型】2017-12-13</p>
<p><a target="_blank" rel="noopener" href="https://www.cnblogs.com/PatrickLiu/p/8057654.html">20.C#设计模式之十九策略模式（Stragety Pattern）【行为型】2017-12-18</a><a target="_blank" rel="noopener" href="https://www.cnblogs.com/PatrickLiu/p/8109100.html">21.C#设计模式之二十职责链模式（Chain of Responsibility Pattern）【行为型】2017-12-25</a><a target="_blank" rel="noopener" href="https://www.cnblogs.com/PatrickLiu/p/8135083.html">22.C#设计模式之二十一访问者模式（Visitor Pattern）【行为型】2017-12-28</a><a target="_blank" rel="noopener" href="https://www.cnblogs.com/PatrickLiu/p/8176974.html">23.C#设计模式之二十二备忘录模式（Memento Pattern）【行为型】2018-01-02</a><a target="_blank" rel="noopener" href="https://www.cnblogs.com/PatrickLiu/p/8242238.html">24.C#设计模式之二十三解释器模式（Interpreter Pattern）【行为型】2018-01-08</a></p>
<p>收起</p>
<p><strong>一、引言</strong>  </p>
<p>   今天我们开始讲“行为型”设计模式的第六个模式，该模式是【状态模式】，英文名称是：State Pattern。无论是现实世界，还是面向对象的OO世界，里面都有一个东西，那就是对象。有对象当然就有状态了。每个对象都有其对应的状态，而每个状态又有对应一些相应的行为，在不同状态下，行为的的方式也是不一样。如果某个对象有多个状态时，那么就会有很多对应的行为。那么对这些状态的判断和根据状态完成的行为，就会导致多重条件语句交织在一起，并且如果添加一种新的状态时，需要更改之前现有的代码。这样的设计显然违背了开闭原则，状态模式正是用来解决这样的问题的。  </p>
<p><strong>二、状态模式的详细介绍</strong>  </p>
<p><strong>2.1、动机（Motivate）</strong>  </p>
<p>   在软件构建过程中，某些对象的状态如果改变，其行为也会随之而发生变化，比如文档处于只读状态，其支持的行为和读写状态支持的行为就可能完全不同。  </p>
<p>   如何在运行时根据对象的状态来透明地更改对象的行为？而不会为对象操作和状态转化之间引入紧耦合？  </p>
<p><strong>2.2、意图（Intent）</strong>  </p>
<p>   允许一个对象在其内部状态改变时改变它的行为。从而使对象看起来似乎修改了其行为。　　　　　　                                ——《设计模式》GoF  </p>
<p><strong>2.3、结构图（Structure）</strong>  </p>
<p>      <img src="http://images2017.cnblogs.com/blog/1048776/201712/1048776-20171213142649316-954765387.png">  </p>
<p><strong>2.4、模式的组成</strong><br>    <br>    可以看出，在状态模式的结构图有以下角色：  </p>
<p>    <strong>（1）、环境角色（Context）：也称上下文，定义客户端所感兴趣的接口，并且保留一个具体状态类的实例。这个具体状态类的实例给出此环境对象的现有状态。</strong><br> <br>    <strong>（2）、抽象状态角色（State）：定义一个接口，用以封装环境对象的一个特定的状态所对应的行为。</strong>  </p>
<p>    <strong>（3）、具体状态角色（ConcreteState）：每一个具体状态类都实现了环境（Context）的一个状态所对应的行为。</strong>  </p>
<p>     在状态模式结构中需要理解环境类与抽象状态类的作用：<br> <br>     环境类实际上就是拥有状态的对象，环境类有时候可以充当状态管理器(State Manager)的角色，可以在环境类中对状态进行切换操作。<br> <br>     抽象状态类可以是抽象类，也可以是接口，不同状态类就是继承这个父类的不同子类，状态类的产生是由于环境类存在多个状态，同时还满足两个条件：这些状态经常需要切换，在不同的状态下对象的行为不同。因此可以将不同对象下的行为单独提取出来封装在具体的状态类中，使得环境类对象在其内部状态改变时可以改变它的行为，对象看起来似乎修改了它的类，而实际上是由于切换到不同的具体状态类实现的。由于环境类可以设置为任一具体状态类，因此它针对抽象状态类进行编程，在程序运行时可以将任一具体状态类的对象设置到环境类中，从而使得环境类可以改变内部状态，并且改变行为。  </p>
<p><strong>2.5、状态模式的代码实现</strong>  </p>
<p>    状态模式在我们的现实生活中也有类似的例子，例如：在我们上网购买商品的过程中，就可以查看订单的随时状态。对于商家来说，订单的状态不同，也会允许客户有不同的动作要求，比如：订单在已经处于发货状态，此订单是不能退货的。如果订单在备货阶段，客户是可以换货或者退货的。如果我们的订单已经发货了，您就等着接收货物吧，如果货物有质量问题，可以拒签，或者顺利完成交易，今天我们就以订单为例来说明状态模式的实现。实现代码如下：</p>

<p><strong>三、状态模式的实现要点：</strong>  </p>
<p>    State模式将所有与一个特定状态相关的行为都放入一个State的子类对象中，在对象状态切换时，切换相应的对象；但同时维持State的接口，这样实现了具体操作与状态转换之间的解耦。  </p>
<p>    为不同的状态引入不同的对象使得状态转换变得更加明确，而且可以保证不会出现状态不一致的情况，因为转换是原子性的——即要么彻底转换过来，要么不转换。  </p>
<p>    如果State对象没有实例变量，那么各个上下文可以共享同一个State对象，从而节省对象开销。  </p>
<p>   <strong>3.1】、状态模式的优点</strong>  </p>
<p>          （1）、封装了转换规则。  </p>
<p>          （2）、枚举可能的状态，在枚举状态之前需要确定状态种类。  </p>
<p>         （3）、将所有与某个状态有关的行为放到一个类中，并且可以方便地增加新的状态，只需要改变对象状态即可改变对象的行为。  </p>
<p>          （4）、允许状态转换逻辑与状态对象合成一体，而不是某一个巨大的条件语句块。  </p>
<p>          （5）、可以让多个环境对象共享一个状态对象，从而减少系统中对象的个数。  </p>
<p>   <strong>3.2】、状态模式的缺点</strong>  </p>
<p>         （1）、状态模式的使用必然会增加系统类和对象的个数。  </p>
<p>         （2）、状态模式的结构与实现都较为复杂，如果使用不当将导致程序结构和代码的混乱。  </p>
<p>         （3）、状态模式对“开闭原则”的支持并不太好，对于可以切换状态的状态模式，增加新的状态类需要修改那些负责状态转换的源代码，否则无法切换到新增状态；而且修改某个状态类的行为也需修改对应类的源代码。  </p>
<p>    <strong>（3）、在以下情况下可以使用状态模式</strong>：  </p>
<p>           （1）、对象的行为依赖于它的状态（属性）并且可以根据它的状态改变而改变它的相关行为。  </p>
<p>          （2）、代码中包含大量与对象状态有关的条件语句，这些条件语句的出现，会导致代码的可维护性和灵活性变差，不能方便地增加和删除状态，使客户类与类库之间的耦合增强。在这些条件语句中包含了对象的行为，而且这些条件对应于对象的各种状态  </p>
<p><strong>四、.NET 状态模式的实现</strong>  </p>
<p>     状态模式在Net里面的实现还没有研究透，如果以后有了新的学习内容，再补充进来。但是我感觉，这个模式可能在业务系统里面有更大的使用。  </p>
<p><strong>五、总结</strong>  </p>
<p>      好了，今天就写到这里了。由于最近感冒了，有几天没写东西了。今天写点东西，只是写的有点慢了。</p>
