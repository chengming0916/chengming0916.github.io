trigger:
- master

pool:
  vmImage: 'Ubuntu-16.04'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '10.x'
  displayName: 'Install Node.js'

- script:
    git config --global core.quotePath false
- script: 
    git config --global user.email chengming0916@gmail.com
- script: 
    git config --global user.name Chemmy
- script:
    npm install hexo-cli -g
- script:
    npm install hexo-deployer-git --save
- script:
    npm install
- script: 
    hexo generate --generate
- script: 
    hexo generate --deploy
    //npm run build

  displayName: 'npm install and build'
